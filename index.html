<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>StoneGuard — Kidney Stone Safety Analyzer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f5f7; color: #1a1a1a; font-family: -apple-system, 'Segoe UI', sans-serif; }
    input::placeholder { color: #aaa; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    ::-webkit-scrollbar { width: 0; }
    a { text-decoration: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;

    const SYSTEM_PROMPT = `You are StoneGuard, a nutritional analyzer for kidney stone patients. Return ONLY valid JSON, no markdown, no backticks, no extra text. Keep ALL text fields SHORT — maximum 1 sentence each, under 12 words. Use this exact structure:
{"productName":"string","overallScore":75,"scoreLabel":"Good","summary":"One short sentence, max 12 words.","stoneTypeRisks":{"calciumOxalate":{"risk":"Low","reason":"Max 8 words."},"uricAcid":{"risk":"Low","reason":"Max 8 words."},"struvite":{"risk":"Low","reason":"Max 8 words."},"cystine":{"risk":"Low","reason":"Max 8 words."}},"negatives":[{"name":"Ingredient","detail":"Max 8 words why bad.","oxalateLevel":"High","amount":""}],"positives":[{"name":"Ingredient","detail":"Max 8 words why good."}],"recommendations":[{"text":"Max 8 words.","product":"Real Brand Name","store":"Whole Foods / Target","amazonUrl":"https://www.amazon.com/s?k=product+name"}],"safeAlternatives":[{"name":"Real Brand Name","reason":"Max 8 words why safer.","store":"Whole Foods / Target","amazonUrl":"https://www.amazon.com/s?k=product+name"}]}
scoreLabel: Excellent, Good, Moderate, Poor, or Very Poor
risk: Low, Medium, or High
oxalateLevel: None, Low, Medium, High, or Very High
Suggest REAL US branded products for recommendations and safeAlternatives.
Return ONLY the JSON object, nothing else.`;

    async function callClaude(messages) {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 2000, system: SYSTEM_PROMPT, messages })
      });
      const data = await res.json();
      if (!res.ok) throw new Error('API error ' + res.status + ': ' + JSON.stringify(data));
      if (data.error) throw new Error(JSON.stringify(data.error));
      if (!data.content?.length) throw new Error('Empty response');
      const text = data.content.map(b => b.type === 'text' ? b.text : '').join('').trim();
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('No JSON returned');
      return JSON.parse(match[0]);
    }

    function ScoreDot({ score }) {
      const color = score >= 80 ? "#22c55e" : score >= 60 ? "#84cc16" : score >= 40 ? "#f97316" : "#ef4444";
      const label = score >= 80 ? "Excellent" : score >= 60 ? "Good" : score >= 40 ? "Poor" : "Very Poor";
      return (
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:18, height:18, borderRadius:"50%", background:color, flexShrink:0 }} />
          <span style={{ fontSize:28, fontWeight:800, color:"#1a1a1a" }}>{score}/100</span>
          <span style={{ fontSize:16, color:"#666", marginTop:2 }}>{label}</span>
        </div>
      );
    }

    function RiskPill({ risk }) {
      const c = { Low:"#22c55e", Medium:"#f97316", High:"#ef4444" };
      const bg = { Low:"#dcfce7", Medium:"#ffedd5", High:"#fee2e2" };
      return <span style={{ padding:"3px 10px", borderRadius:20, fontSize:12, fontWeight:700, color:c[risk]||"#666", background:bg[risk]||"#f5f5f5" }}>{risk} Risk</span>;
    }

    function App() {
      const [mode, setMode] = useState("search");
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [imagePreview, setImagePreview] = useState(null);
      const [imageBase64, setImageBase64] = useState(null);
      const [imageMime, setImageMime] = useState("image/jpeg");
      const [expandedStones, setExpandedStones] = useState(false);
      const fileRef = useRef();

      async function analyzeText(q) {
        setLoading(true); setError(null); setResult(null);
        try { setResult(await callClaude([{ role:"user", content:"Analyze for kidney stone patients: " + q }])); }
        catch(e) { setError(e.message); }
        setLoading(false);
      }

      async function analyzeImage(b64, mime) {
        setLoading(true); setError(null); setResult(null);
        try {
          setResult(await callClaude([{ role:"user", content:[
            { type:"image", source:{ type:"base64", media_type:mime, data:b64 } },
            { type:"text", text:"Analyze the ingredients on this product label for kidney stone patients." }
          ]}]));
        } catch(e) { setError(e.message); }
        setLoading(false);
      }

      function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        setImageMime(file.type || "image/jpeg");
        const reader = new FileReader();
        reader.onload = ev => { setImagePreview(ev.target.result); setImageBase64(ev.target.result.split(",")[1]); };
        reader.readAsDataURL(file);
      }

      function reset() { setResult(null); setInput(""); setImagePreview(null); setImageBase64(null); setError(null); setExpandedStones(false); }

      return (
        <div style={{ minHeight:"100vh", background:"#f5f5f7", paddingBottom:60 }}>

          <div style={{ background:"#fff", borderBottom:"1px solid #eee", padding:"20px 20px 16px", position:"sticky", top:0, zIndex:100 }}>
            <div style={{ maxWidth:540, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:36, height:36, borderRadius:10, background:"linear-gradient(135deg,#38bdf8,#6366f1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🛡</div>
                <div>
                  <h1 style={{ fontSize:20, fontWeight:800, letterSpacing:-0.3 }}>Stone<span style={{ color:"#38bdf8" }}>Guard</span></h1>
                  <p style={{ fontSize:11, color:"#999", marginTop:-1 }}>Kidney Stone Safety Analyzer</p>
                </div>
              </div>
              {result && <button onClick={reset} style={{ fontSize:13, color:"#38bdf8", background:"none", border:"none", cursor:"pointer", fontWeight:600 }}>← Back</button>}
            </div>
          </div>

          <div style={{ maxWidth:540, margin:"0 auto", padding:"0 16px" }}>

            {!result && (
              <div style={{ animation:"fadeIn 0.3s ease" }}>
                <div style={{ marginTop:20, display:"flex", background:"#e8e8ed", borderRadius:12, padding:3 }}>
                  {[["search","🔍 Search"],["upload","📷 Upload Label"],["barcode","📦 Barcode"]].map(([m,l]) => (
                    <button key={m} onClick={() => { setMode(m); reset(); }} style={{ flex:1, padding:"10px 6px", borderRadius:10, border:"none",
                      background:mode===m?"#fff":"transparent", color:mode===m?"#1a1a1a":"#888",
                      fontSize:12, fontWeight:700, cursor:"pointer", boxShadow:mode===m?"0 1px 4px rgba(0,0,0,0.1)":"none", transition:"all 0.2s" }}>{l}</button>
                  ))}
                </div>

                <div style={{ marginTop:16 }}>
                  {mode === "search" && (
                    <div style={{ display:"flex", gap:10 }}>
                      <input value={input} onChange={e => setInput(e.target.value)}
                        onKeyDown={e => e.key==="Enter" && !loading && input.trim() && analyzeText(input.trim())}
                        placeholder="e.g. spinach, almonds, Truvani protein..."
                        style={{ flex:1, padding:"14px 16px", borderRadius:14, background:"#fff", border:"1.5px solid #e5e5ea", color:"#1a1a1a", fontSize:15, outline:"none", boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }} />
                      <button onClick={() => input.trim() && analyzeText(input.trim())} disabled={loading || !input.trim()}
                        style={{ padding:"14px 22px", borderRadius:14, background:"linear-gradient(135deg,#38bdf8,#6366f1)", border:"none", color:"#fff", fontSize:14, fontWeight:700, cursor:loading?"not-allowed":"pointer", opacity:loading?0.6:1, boxShadow:"0 2px 8px rgba(56,189,248,0.3)" }}>
                        {loading ? "..." : "Analyze"}
                      </button>
                    </div>
                  )}

                  {mode === "upload" && (
                    <div>
                      <div onClick={() => fileRef.current?.click()} style={{ border:"2px dashed #c7d2fe", borderRadius:16, padding:"32px 20px", textAlign:"center", cursor:"pointer", background:"#fff", minHeight:140, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
                        {imagePreview
                          ? <img src={imagePreview} alt="label" style={{ maxHeight:220, borderRadius:10, maxWidth:"100%" }} />
                          : <><div style={{ fontSize:40, marginBottom:10 }}>📷</div><p style={{ color:"#aaa", fontSize:13 }}>Tap to upload ingredient label photo</p></>}
                      </div>
                      <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display:"none" }} />
                      {imagePreview && (
                        <button onClick={() => analyzeImage(imageBase64, imageMime)} disabled={loading}
                          style={{ width:"100%", marginTop:12, padding:"15px", borderRadius:14, background:"linear-gradient(135deg,#38bdf8,#6366f1)", border:"none", color:"#fff", fontSize:15, fontWeight:700, cursor:loading?"not-allowed":"pointer", opacity:loading?0.6:1 }}>
                          {loading ? "Analyzing..." : "Analyze Label"}
                        </button>
                      )}
                    </div>
                  )}

                  {mode === "barcode" && (
                    <div style={{ border:"2px dashed #e5e5ea", borderRadius:16, padding:"48px 20px", textAlign:"center", background:"#fff" }}>
                      <div style={{ fontSize:40, marginBottom:12 }}>📦</div>
                      <p style={{ color:"#aaa", fontSize:13, lineHeight:1.7 }}>Barcode scanning coming in v2.<br />Use <strong style={{ color:"#38bdf8" }}>Search</strong> or <strong style={{ color:"#38bdf8" }}>Upload Label</strong> for now.</p>
                    </div>
                  )}
                </div>

                {loading && (
                  <div style={{ textAlign:"center", padding:"56px 20px" }}>
                    <div style={{ width:44, height:44, borderRadius:"50%", border:"3px solid #e5e5ea", borderTopColor:"#38bdf8", animation:"spin 0.8s linear infinite", margin:"0 auto 16px" }} />
                    <p style={{ color:"#aaa", fontSize:13 }}>Analyzing for kidney stone risk...</p>
                  </div>
                )}

                {error && !loading && (
                  <div style={{ marginTop:16, padding:16, borderRadius:14, background:"#fff1f2", border:"1px solid #fecdd3", color:"#e11d48", fontSize:13, lineHeight:1.6 }}>
                    <strong style={{ display:"block", marginBottom:4 }}>⚠️ Error</strong>{error}
                  </div>
                )}

                {!loading && !error && (
                  <div style={{ textAlign:"center", padding:"56px 20px" }}>
                    <div style={{ fontSize:56, marginBottom:16 }}>🛡️</div>
                    <p style={{ color:"#bbb", fontSize:14, lineHeight:1.8 }}>
                      Search any food or ingredient,<br />upload a product label photo,<br />or scan a barcode to get your<br />kidney stone safety score.
                    </p>
                  </div>
                )}
              </div>
            )}

            {result && !loading && (
              <div style={{ animation:"fadeIn 0.4s ease" }}>

                <div style={{ background:"#fff", borderRadius:20, padding:20, marginTop:16, marginBottom:12, boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
                  <div style={{ display:"flex", alignItems:"flex-start", gap:16 }}>
                    <div style={{ width:80, height:80, borderRadius:14, background:"linear-gradient(135deg,#f0f9ff,#e0f2fe)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:36, flexShrink:0 }}>🥗</div>
                    <div style={{ flex:1 }}>
                      <h2 style={{ fontSize:20, fontWeight:800, color:"#1a1a1a", marginBottom:4, lineHeight:1.2 }}>{result.productName}</h2>
                      <p style={{ fontSize:12, color:"#999", marginBottom:10 }}>Kidney Stone Risk Analysis</p>
                      <ScoreDot score={result.overallScore} />
                    </div>
                  </div>
                  <p style={{ marginTop:14, fontSize:13, color:"#555", lineHeight:1.5, borderTop:"1px solid #f5f5f7", paddingTop:12 }}>{result.summary}</p>
                </div>

                <div style={{ background:"#fff", borderRadius:20, padding:20, marginBottom:12, boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
                  <button onClick={() => setExpandedStones(!expandedStones)}
                    style={{ width:"100%", display:"flex", justifyContent:"space-between", alignItems:"center", background:"none", border:"none", cursor:"pointer", padding:0 }}>
                    <h3 style={{ fontSize:18, fontWeight:800, color:"#1a1a1a" }}>Risk by Stone Type</h3>
                    <span style={{ fontSize:18, color:"#aaa", transform:expandedStones?"rotate(180deg)":"none", transition:"0.2s" }}>⌄</span>
                  </button>
                  {expandedStones && (
                    <div style={{ marginTop:14 }}>
                      {Object.entries(result.stoneTypeRisks || {}).map(([type, data]) => (
                        <div key={type} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingBottom:10, marginBottom:10, borderBottom:"1px solid #f5f5f7" }}>
                          <div style={{ flex:1, marginRight:12 }}>
                            <span style={{ fontSize:13, fontWeight:700, color:"#1a1a1a", display:"block", marginBottom:2 }}>
                              {type==="calciumOxalate"?"Calcium Oxalate":type==="uricAcid"?"Uric Acid":type==="struvite"?"Struvite":"Cystine"}
                            </span>
                            <p style={{ fontSize:11, color:"#888" }}>{data.reason}</p>
                          </div>
                          <RiskPill risk={data.risk} />
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {(result.negatives||[]).length > 0 && (
                  <div style={{ background:"#fff", borderRadius:20, padding:20, marginBottom:12, boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                      <h3 style={{ fontSize:18, fontWeight:800, color:"#1a1a1a" }}>Negatives</h3>
                      <span style={{ fontSize:11, color:"#aaa" }}>per serving</span>
                    </div>
                    {result.negatives.map((item, i) => (
                      <div key={i} style={{ display:"flex", alignItems:"center", gap:12, paddingBottom:12, marginBottom:12, borderBottom:i<result.negatives.length-1?"1px solid #f5f5f7":"none" }}>
                        <div style={{ width:32, height:32, borderRadius:10, background:"#fff1f2", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0 }}>⚠️</div>
                        <div style={{ flex:1 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                            <span style={{ fontSize:14, fontWeight:700, color:"#1a1a1a" }}>{item.name}</span>
                            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                              {item.oxalateLevel && item.oxalateLevel !== "None" && item.oxalateLevel !== "Low" && (
                                <span style={{ padding:"2px 7px", borderRadius:8, background:"#fee2e2", color:"#dc2626", fontSize:10, fontWeight:600 }}>{item.oxalateLevel}</span>
                              )}
                              <div style={{ width:9, height:9, borderRadius:"50%", background:"#ef4444" }} />
                            </div>
                          </div>
                          <p style={{ fontSize:11, color:"#888", marginTop:2 }}>{item.detail}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {(result.positives||[]).length > 0 && (
                  <div style={{ background:"#fff", borderRadius:20, padding:20, marginBottom:12, boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                      <h3 style={{ fontSize:18, fontWeight:800, color:"#1a1a1a" }}>Positives</h3>
                      <span style={{ fontSize:11, color:"#aaa" }}>per serving</span>
                    </div>
                    {result.positives.map((item, i) => (
                      <div key={i} style={{ display:"flex", alignItems:"center", gap:12, paddingBottom:12, marginBottom:12, borderBottom:i<result.positives.length-1?"1px solid #f5f5f7":"none" }}>
                        <div style={{ width:32, height:32, borderRadius:10, background:"#f0fdf4", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0 }}>✨</div>
                        <div style={{ flex:1 }}>
                          <span style={{ fontSize:14, fontWeight:700, color:"#1a1a1a", display:"block" }}>{item.name}</span>
                          <p style={{ fontSize:11, color:"#888", marginTop:2 }}>{item.detail}</p>
                        </div>
                        <div style={{ width:9, height:9, borderRadius:"50%", background:"#22c55e", flexShrink:0 }} />
                      </div>
                    ))}
                  </div>
                )}

                {(result.recommendations||[]).length > 0 && (
                  <div style={{ marginBottom:12 }}>
                    <h3 style={{ fontSize:18, fontWeight:800, color:"#1a1a1a", marginBottom:12, paddingLeft:4 }}>Recommendations</h3>
                    <div style={{ display:"flex", gap:12, overflowX:"auto", paddingBottom:8, scrollbarWidth:"none", scrollSnapType:"x mandatory" }}>
                      {result.recommendations.map((r, i) => (
                        <div key={i} style={{ minWidth:"calc(100vw - 48px)", maxWidth:"calc(100vw - 48px)", background:"#fff", borderRadius:14, padding:16, boxShadow:"0 2px 12px rgba(0,0,0,0.07)", flexShrink:0, scrollSnapAlign:"start" }}>
                          <div style={{ width:32, height:32, borderRadius:8, background:"linear-gradient(135deg,#f0f9ff,#e0f2fe)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, marginBottom:8 }}>🛒</div>
                          <p style={{ fontSize:11, color:"#555", marginBottom:5 }}>{typeof r === "string" ? r : r.text}</p>
                          {r.product && <p style={{ fontSize:12, fontWeight:700, color:"#1a1a1a", marginBottom:3 }}>{r.product}</p>}
                          {r.store && <p style={{ fontSize:10, color:"#aaa", marginBottom:8 }}>📍 {r.store}</p>}
                          {r.amazonUrl && (
                            <a href={r.amazonUrl} target="_blank" rel="noopener noreferrer"
                              style={{ display:"block", padding:"6px 8px", borderRadius:8, background:"#fff8ee", border:"1px solid #fed7aa", color:"#ea580c", fontSize:11, fontWeight:700, textAlign:"center" }}>
                              Amazon →
                            </a>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {(result.safeAlternatives||[]).length > 0 && (
                  <div style={{ marginBottom:12 }}>
                    <h3 style={{ fontSize:18, fontWeight:800, color:"#1a1a1a", marginBottom:12, paddingLeft:4 }}>Safer Alternatives</h3>
                    <div style={{ display:"flex", gap:12, overflowX:"auto", paddingBottom:8, scrollbarWidth:"none", scrollSnapType:"x mandatory" }}>
                      {result.safeAlternatives.map((a, i) => (
                        <div key={i} style={{ minWidth:"calc(100vw - 48px)", maxWidth:"calc(100vw - 48px)", background:"#fff", borderRadius:14, padding:16, boxShadow:"0 2px 12px rgba(0,0,0,0.07)", flexShrink:0, scrollSnapAlign:"start" }}>
                          <div style={{ width:32, height:32, borderRadius:8, background:"#f0fdf4", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, marginBottom:8 }}>✅</div>
                          <p style={{ fontSize:12, fontWeight:700, color:"#1a1a1a", marginBottom:3 }}>{typeof a === "string" ? a : a.name}</p>
                          {a.reason && <p style={{ fontSize:11, color:"#555", marginBottom:5 }}>{a.reason}</p>}
                          {a.store && <p style={{ fontSize:10, color:"#aaa", marginBottom:8 }}>📍 {a.store}</p>}
                          {a.amazonUrl && (
                            <a href={a.amazonUrl} target="_blank" rel="noopener noreferrer"
                              style={{ display:"block", padding:"6px 8px", borderRadius:8, background:"#fff8ee", border:"1px solid #fed7aa", color:"#ea580c", fontSize:11, fontWeight:700, textAlign:"center" }}>
                              Amazon →
                            </a>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <div style={{ background:"#f5f5f7", borderRadius:14, padding:12, marginBottom:24, border:"1px solid #e5e5ea" }}>
                  <p style={{ fontSize:10, color:"#aaa", lineHeight:1.6, textAlign:"center" }}>
                    ⚕️ <strong style={{ color:"#888" }}>Medical Disclaimer:</strong> For informational purposes only. Always consult a healthcare professional before making dietary decisions.
                  </p>
                </div>

              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <div style="text-align:center; padding: 24px 16px 40px; max-width:540px; margin:0 auto;">
    <p style="font-size:11px; color:rgba(255,255,255,0.2); line-height:1.7;">
      ⚕️ <strong style="color:rgba(255,255,255,0.3);">Medical Disclaimer:</strong> StoneGuard is for informational purposes only and does not constitute medical advice. Always consult a qualified healthcare professional or physician before making dietary or health decisions. Individual results may vary based on your specific medical condition.
    </p>
  </div>
</body>
</html>
